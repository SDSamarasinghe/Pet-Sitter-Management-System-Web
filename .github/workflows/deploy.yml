name: Deploy Web to Azure VM

permissions:
  contents: read

concurrency:
  group: production-web-deploy
  cancel-in-progress: true

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: production

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup SSH
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -H ${{ secrets.HOST_IP }} >> ~/.ssh/known_hosts

    - name: Pull code and deploy
      env:
        NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
      run: |
        ssh -i ~/.ssh/id_rsa azureuser@${{ secrets.HOST_IP }} 'set -e
        cd /var/www/Pet-Sitter-Management-System-Web
        git fetch origin
        git reset --hard origin/master || git reset --hard origin/main
        printf "NODE_ENV=production\nNEXT_PUBLIC_API_URL=%s\nNEXT_PUBLIC_CLOUDINARY_CLOUD_NAME=dnutx6czj\nNEXT_PUBLIC_CLOUDINARY_UPLOAD_PRESET=test_upload\n" "$NEXT_PUBLIC_API_URL" > .env
        printf "services:\n  web:\n    build:\n      context: .\n      dockerfile: Dockerfile\n    ports:\n      - 3000:3000\n    environment:\n      - NODE_ENV=production\n      - NEXT_PUBLIC_API_URL=%s\n    restart: unless-stopped\n    logging:\n      driver: json-file\n      options:\n        max-size: 10m\n        max-file: \"3\"\n" "$NEXT_PUBLIC_API_URL" > docker-compose.yml
        docker image prune -f 2>/dev/null || true
        docker compose build --no-cache
        docker compose up -d --remove-orphans'

    - name: Health check
      run: |
        ssh -i ~/.ssh/id_rsa azureuser@${{ secrets.HOST_IP }} 'MAX=15; COUNT=0
        until curl -sf http://localhost:3000; do
          COUNT=$((COUNT+1))
          if [ $COUNT -ge $MAX ]; then
            cd /var/www/Pet-Sitter-Management-System-Web
            PREV=$(git log --oneline -2 | tail -n1 | awk "{print \$1}")
            git reset --hard "$PREV"
            docker compose build --no-cache
            docker compose up -d --remove-orphans
            exit 1
          fi
          sleep 10
        done
        echo "Web is healthy!"
        docker compose ps'
